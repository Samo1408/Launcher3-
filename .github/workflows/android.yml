
name: Android CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - variant: aospDebug
            flavor: aosp
          - variant: l3goDebug
            flavor: l3go
          - variant: quickstepDebug
            flavor: quickstep
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Configure Gradle for Java 17
        run: |
          # Add JVM args to gradle.properties for Java 17 compatibility
          cat >> gradle.properties << EOF
          
          org.gradle.jvmargs=-Dfile.encoding=UTF-8 \
            --add-opens=java.base/java.lang=ALL-UNNAMED \
            --add-opens=java.base/java.lang.reflect=ALL-UNNAMED \
            --add-opens=java.base/java.util=ALL-UNNAMED
          EOF

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build ${{ matrix.variant }}
        run: ./gradlew assemble${{ matrix.variant }} --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.variant }}
          path: app/build/outputs/apk/${{ matrix.flavor }}/debug/*.apk
          retention-days: 7

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Configure Gradle for Java 17
        run: |
          cat >> gradle.properties << EOF
          
          org.gradle.jvmargs=-Dfile.encoding=UTF-8 \
            --add-opens=java.base/java.lang=ALL-UNNAMED \
            --add-opens=java.base/java.lang.reflect=ALL-UNNAMED \
            --add-opens=java.base/java.util=ALL-UNNAMED
          EOF

      - name: Run unit tests
        run: ./gradlew testAospDebugUnitTest --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/test-results/
          retention-days: 14
